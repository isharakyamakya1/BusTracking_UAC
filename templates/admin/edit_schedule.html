{% extends 'base.html' %}

{% block title %}Modifier Horaire - Admin{% endblock %}

{% block content %}
<div class="admin-page py-4">
    <div class="page-header mb-4">
        <h1>Modifier un horaire</h1>
        <p class="text-muted">Mettre à jour les informations de l'horaire existant.</p>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <form method="POST" class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Bus</label>
                    <select name="bus_id" class="form-select" required>
                        <option value="">Sélectionnez un bus</option>
                        {% for b in buses %}
                        <option value="{{ b.id }}" {{ 'selected' if b.id == schedule.bus_id else '' }}>{{ b.plaque }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Chauffeur</label>
                    <select name="driver_id" class="form-select" required>
                        <option value="">Sélectionnez un chauffeur</option>
                        {% for d in drivers %}
                        <option value="{{ d.id }}" {{ 'selected' if d.id == schedule.driver_id else '' }}>{{ d.nom }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Destination</label>
                    <input type="text" name="destination" class="form-control" value="{{ schedule.destination }}" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Date</label>
                    <input type="date" name="date" class="form-control" value="{{ schedule.date }}" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Heure départ</label>
                    <input type="time" name="heure_depart" class="form-control" value="{{ schedule.heure_depart }}" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Disponibilité</label>
                    <select name="disponible" class="form-select">
                        <option value="oui" {{ 'selected' if schedule.disponible == 'oui' else '' }}>Disponible</option>
                        <option value="non" {{ 'selected' if schedule.disponible == 'non' else '' }}>Non disponible</option>
                    </select>
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <button class="btn btn-primary w-100" type="submit">Enregistrer</button>
                </div>
            </form>
            <div class="mt-3">
                <a href="/admin/schedules" class="btn btn-secondary">Retour aux horaires</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
